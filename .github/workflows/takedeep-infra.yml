name: TakeDeep infra

on:
  pull_request:
    paths:
      - "infra/takedeep/**"
      - ".github/workflows/takedeep-infra.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate infra scripts and config
        run: bash infra/takedeep/validate.sh
